spring:
  datasource:
    url: jdbc:h2:mem:dailyus;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml

jwt:
  issuer: test-daily-us
  secret: test-secret-key-that-is-long-enough-for-hmac-256
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 1209600
