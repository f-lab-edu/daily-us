spring:
  profiles:
    active: local
  config:
    import: classpath:config/
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      client-name: ${REDIS_CLIENT_NAME}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml

jwt:
  issuer: daily-us
  secret: ${JWT_SECRET}
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 1209600

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: prometheus,health,info,metrics

app:
  kafka:
    topics:
      post-created: ${KAFKA_TOPIC_POST_CREATED}
  feed-cache:
    hybrid:
      enabled: true
      hot-author-threshold: 10000
    warmup:
      enabled: true
  aggregate-reconciliation:
    hot:
      enabled: true
      cron: 0 */5 * * * *
      batch-size: 200
    full:
      enabled: true
      cron: 0 0 4 * * *
      batch-size: 1000
